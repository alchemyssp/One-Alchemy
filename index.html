<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSP - Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=3"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0E0E0E;
  background-image:
    radial-gradient(ellipse at 15% 50%, rgba(32,76,133,.18) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 20%, rgba(32,76,133,.10) 0%, transparent 50%);
}
h1, h2, h3, h4, h5 { font-weight: 700; }
.card {
  background: #fff;
  width: 420px;
  padding: 48px 44px;
  border-radius: 16px;
  box-shadow: 0 32px 100px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04);
}
.logo { text-align: center; margin-bottom: 36px; }
.logo-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 52px; height: 52px; background: linear-gradient(135deg,#175FBD 0%,#114588 100%);
  border-radius: 14px; margin-bottom: 14px;
  font-size: 24px; box-shadow: 0 4px 16px rgba(17,69,138,.35);
}
.logo h1 { font-size: 20px; color: #111; font-weight: 700; letter-spacing: -.3px; }
.logo p { font-size: 13px; color: #9CA3AF; margin-top: 5px; }
.form-group { margin-bottom: 16px; }
label { font-size: 13px; font-weight: 600; color: #374151; display: block; margin-bottom: 7px; }
input {
  width: 100%; padding: 12px 16px;
  border: 1.5px solid #E5E7EB; border-radius: 10px;
  font-size: 14px; font-family: inherit; color: #111;
  background: #FAFAFA; transition: all .2s;
}
input:focus { outline: none; border-color: #204C85; background: #fff; box-shadow: 0 0 0 3px rgba(32,76,133,.08); }
.btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg,#175FBD 0%,#1556AB 45%,#114588 100%); color: #fff;
  border: none; border-radius: 10px;
  font-size: 15px; font-family: inherit;
  font-weight: 600; cursor: pointer;
  transition: all .2s; margin-top: 8px;
  letter-spacing: .2px; box-shadow: 0 3px 12px rgba(17,69,138,.3);
}
.btn:hover { background: linear-gradient(135deg,#1556AB 0%,#114588 100%); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(17,69,138,.4); }
.btn:active { transform: translateY(0); }
.btn:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-outline {
  background: transparent; color: #204C85;
  border: 1.5px solid #E5E7EB; margin-top: 10px;
}
.btn-outline:hover { background: #F3F7FD; border-color: #204C85; transform: none; box-shadow: none; }
.link-text { text-align: center; margin-top: 20px; font-size: 13px; color: #9CA3AF; }
.link-text a { color: #204C85; text-decoration: none; font-weight: 600; }
.link-text a:hover { text-decoration: underline; }
.alert { padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 16px; }
.alert-error { background: #F3F7FD; color: #215293; border: 1px solid #CFE1F9; }
.alert-success { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
.divider { text-align: center; margin: 22px 0; color: #D1D5DB; font-size: 13px; position: relative; }
.divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #E5E7EB; }
.divider::before { left: 0; }
.divider::after { right: 0; }
</style>
<link rel="stylesheet" href="css/ssp-theme.css?v=17">
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <h1>SSP</h1>
    <p>Sales & Promotion Platform</p>
  </div>

  <div id="alertBox" style="display:none"></div>

  <div id="loginForm">
    <div class="form-group">
      <label>Passcode</label>
      <div style="position:relative">
        <input type="password" id="passcode" placeholder="••••••••" onkeydown="if(event.key==='Enter') login()" autocomplete="off" autocapitalize="none" spellcheck="false" style="padding-right:44px">
        <button type="button" onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#999;font-size:16px;padding:0;line-height:1" id="eyeBtn">👁</button>
      </div>
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Sign In</button>
    <div class="link-text" style="margin-top:16px;font-size:12px;color:#bbb">Contact your administrator for the passcode</div>
  </div>
</div>

<script>
function withTimeout(promise, ms = 12000) {
  return Promise.race([promise, new Promise((_, r) => setTimeout(() => r(new Error('TIMEOUT')), ms))]);
}

async function checkSession() {
  try {
    const { data } = await withTimeout(supabase.auth.getSession());
    if (data.session) window.location.href = 'dashboard.html';
  } catch(e) {}
}

function togglePw() {
  const inp = document.getElementById('passcode');
  const btn = document.getElementById('eyeBtn');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showAlert(msg, type = 'error') {
  const el = document.getElementById('alertBox');
  el.className = `alert alert-${type}`;
  el.textContent = msg;
  el.style.display = 'block';
}
function hideAlert() { document.getElementById('alertBox').style.display = 'none'; }

function setLoading(on) {
  const b = document.getElementById('loginBtn');
  b.disabled = on;
  b.textContent = on ? 'Signing in…' : 'Sign In';
}

const SHARED_ACCOUNT_EMAIL = 'sales_admin1@alchemy-asia.com';

async function login() {
  hideAlert();
  const passcode = document.getElementById('passcode').value;
  if (!passcode) { showAlert('Please enter the passcode'); return; }

  setLoading(true);
  try {
    const { error } = await withTimeout(
      supabase.auth.signInWithPassword({ email: SHARED_ACCOUNT_EMAIL, password: passcode })
    );
    if (error) {
      showAlert('Incorrect passcode');
      return;
    }

    window.location.href = 'dashboard.html';
  } catch(e) {
    showAlert(e.message === 'TIMEOUT' ? 'Connection timed out, please try again' : 'Error: ' + e.message);
  } finally {
    setLoading(false);
  }
}

checkSession();
</script>
<script src="js/nav-icons.js"></script>
</body>
</html>
