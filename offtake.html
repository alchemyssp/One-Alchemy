<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: linear-gradient(160deg,#ffffff 0%,#F4F4F5 50%,#EBEBED 100%); background-attachment: fixed; color: #1E293B; display: flex; font-size: 14px; line-height: 1.55; font-weight: 400; }
h1, h2, h3, h4, h5 { font-weight: 800; text-wrap: balance; }
button { font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
input, select, textarea { font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; font-weight: 400; }
label { font-family: 'DM Sans', system-ui, sans-serif; font-size: 11px; font-weight: 700; }

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar{
  width:240px;height:100vh;
  background:#080C11;
  position:fixed;left:0;top:0;
  display:flex;flex-direction:column;
  z-index:100;
  box-shadow:4px 0 32px rgba(0,0,0,.45);
  overflow:hidden;
}
.sidebar::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:#175FBD;
}

.sb-logo{padding:28px 20px 20px;display:flex;align-items:center;gap:12px}
.sb-logo-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#0F3E7C,#175FBD);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 14px rgba(23,95,189,.4);}
.sb-logo-text h3{font-size:14px;font-weight:800;color:#fff;letter-spacing:.3px}
.sb-logo-text p{font-size:10.5px;color:rgba(255,255,255,.35);margin-top:1px;font-weight:400}
.nav-links{flex:1;padding:8px 12px;overflow-y:auto;overflow-x:hidden}
.nav-links::-webkit-scrollbar{width:3px}
.nav-links::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px}
.nav-section{padding:16px 8px 6px;font-size:9.5px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,.22);}
.nav-section:first-child{padding-top:4px}
.nav-links a{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:rgba(255,255,255,.5);text-decoration:none;font-size:13px;font-weight:500;transition:background .18s,color .18s,transform .15s;position:relative;margin-bottom:2px;border:1px solid transparent;}
.nav-links a .nav-ico{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;background:rgba(255,255,255,.05);transition:background .18s,box-shadow .18s;}
.nav-links a:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9);transform:translateX(2px);}
.nav-links a:hover .nav-ico{background:rgba(255,255,255,.1)}
.nav-links a.active{background:linear-gradient(135deg,rgba(15,62,124,.55),rgba(23,95,189,.3));color:#fff;border-color:rgba(23,95,189,.35);box-shadow:0 4px 16px rgba(15,62,124,.25),inset 0 1px 0 rgba(255,255,255,.08);}
.nav-links a.active .nav-ico{background:linear-gradient(135deg,#0F3E7C,#175FBD);box-shadow:0 4px 12px rgba(23,95,189,.45);}
.nav-links a.nav-sub{padding-left:24px;font-size:12px;color:rgba(255,255,255,.4);margin-left:8px;border-radius:8px;}
.nav-links a.nav-sub .nav-ico{width:28px;height:28px;font-size:13px;background:transparent;}
.nav-links a.nav-sub:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.nav-links a.nav-sub.active{color:#fff;background:rgba(23,95,189,.2);border-color:rgba(23,95,189,.25);}
.nav-links a.nav-sub.active .nav-ico{background:rgba(23,95,189,.3)}
.sidebar-user{padding:14px 16px 18px;border-top:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.02);}
.sb-user-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-avatar{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#0F3E7C,#175FBD);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff;box-shadow:0 3px 10px rgba(15,62,124,.4);}
.sidebar-user .sname{font-size:12.5px;font-weight:700;color:#fff;line-height:1.2}
.sidebar-user .semail{font-size:10.5px;color:rgba(255,255,255,.3);margin-top:1px}
.btn-logout{width:100%;padding:8px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.09);border-radius:8px;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s;}
.btn-logout:hover{background:rgba(15,62,124,.35);color:#fff;border-color:rgba(23,95,189,.4)}

.main { margin-left: 240px; flex: 1; padding: 32px; min-height: 100vh; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; }
.page-header h2 { font-size: 22px; font-weight: 800; }
.page-header p { font-size: 13px; color: #888; margin-top: 4px; }

.toolbar {
  background: #fff; border-radius: 12px; padding: 14px 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 16px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.search-box { flex: 1; min-width: 200px; position: relative; }
.search-box input {
  width: 100%; padding: 10px 16px 10px 40px;
  border: 1px solid #e6edf2; border-radius: 10px;
  font-size: 14px; font-family: inherit;
}
.search-box input:focus { outline: none; border-color: #204C85; }
.search-box::before { content: '🔍'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); }

.btn {
  padding: 10px 18px; border: none; border-radius: 10px;
  font-size: 13px; font-family: inherit; font-weight: 500;
  cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 6px;
}
.btn-export { background: #fff; border: 1px solid #e6edf2; color: #555; }
.btn-export:hover { background: #F3F7FD; border-color: #204C85; color: #204C85; }

.info-bar {
  background: #fff; border-radius: 12px; padding: 14px 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04); margin-bottom: 16px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
}
.info-item { font-size: 13px; color: #555; }
.info-item strong { color: #2c3e50; font-weight: 600; }

.table-card {
  background: #fff; border-radius: 16px;
  box-shadow: 0 4px 20px rgba(11,45,89,.10),0 1px 4px rgba(11,45,89,.06); overflow: hidden;
}
.overflow-x { overflow-x: auto; overflow-y: auto; max-height: 72vh; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
th {
  text-align: left; padding: 12px 14px;
  font-size: 12px; color: #fff; font-weight: 600;
  background: #204C85;
  white-space: nowrap; cursor: pointer; user-select: none;
  position: sticky; top: 0; z-index: 2;
  border-right: 1px solid rgba(255,255,255,.12);
}
th:hover { background: linear-gradient(90deg,#273C57 0%,#114588 100%); }
td { padding: 10px 14px; font-size: 13.5px; border-bottom: 1px solid #EEF2F8; border-right: 1px solid #F3F6FA; }
th:last-child, td:last-child { border-right: none; }
tr:last-child td { border-bottom: none; }
tbody tr:nth-child(even) td { background: #FAFCFF; }
tr:hover td { background: #F6F9FE; }
th:first-child, td:first-child {
  position: sticky; left: 0; z-index: 1;
  background: #fff;
  box-shadow: 1px 0 0 rgba(11,45,89,.06);
}
th:first-child { z-index: 3; background: #204C85; }
tfoot td {
  font-weight: 700; background: #EAF1FC !important; color: #114588;
  border-top: 2px solid #175FBD; border-bottom: none;
}

.empty { text-align: center; padding: 60px 20px; color: #bbb; }
.empty .ei { font-size: 40px; margin-bottom: 12px; }
.empty p { font-size: 14px; }

.dot { display: inline-block; width: 7px; height: 7px; background: #4D8FE6; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.col-num { text-align: right; font-variant-numeric: tabular-nums; }
.col-date { white-space: nowrap; }
/* force nav labels visible */
.nav-links a>span{display:inline!important;width:auto!important;max-width:none!important;flex-shrink:1!important;opacity:1!important;color:inherit!important}
</style>
<link rel="stylesheet" href="css/ssp-theme.css?v=10">
</head>
<body>

<nav class="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">🏢</div>
    <div class="sb-logo-text"><h3>SSP</h3><p>Sales &amp; Promotion</p></div>
  </div>
  <div class="nav-links">
    <div class="nav-section">Main Menu</div>
    <a href="dashboard.html">Dashboard</a>
    <div class="nav-section">Master Data</div>
    <a href="outlets.html">Outlet Master</a>
    <a href="data_u.html" class="nav-sub">Data Universe</a>
    <a href="contracts.html">Contract Master</a>
    <a href="promotions.html">Promotions</a>
    <div class="nav-section">Analytics</div>
    <a href="roi.html">ROI Analysis</a>
    <a href="offtake.html" class="active">Off-take 2026</a>
    <a href="sku.html">SKU</a>
    <div class="nav-section">System</div>
    <a href="users.html">User Management</a>
  </div>
  <div class="sidebar-user">
    <div class="sb-user-row">
      <div class="sb-avatar" id="userAvatar">—</div>
      <div><div class="sname" id="userName">—</div><div class="semail" id="userEmail">—</div></div>
    </div>
    <button class="btn-logout" onclick="logout()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</nav>

<div class="main">
  <div class="page-header">
    <div>
      <h2>📦 Off-take 2026 <span class="dot"></span></h2>
      <p>Off-take data 2026 — Real-time sync</p>
    </div>
    <button class="btn btn-export" onclick="exportExcel()">⬇️ Export Excel</button>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search..." oninput="filterRows()">
    </div>
    <span style="font-size:13px;color:#aaa" id="rowCount">Loading...</span>
  </div>

  <div id="infoBar" class="info-bar" style="display:none"></div>

  <div class="table-card">
    <div class="overflow-x">
      <div id="tableWrap">
        <div class="empty"><div class="ei">⏳</div><p>Loading data...</p></div>
      </div>
    </div>
  </div>
</div>

<script>
let allData = [];
let columns = [];
let sortCol = '';
let sortAsc = true;

async function checkAuth() {
  const { data } = await supabase.auth.getSession();
  if (!data.session) { window.location.href = 'index.html'; return; }
  const u = data.session.user;
  const { data: p } = await supabase.from('user_profile').select('username').eq('auth_email', u.email).maybeSingle();
  document.getElementById('userEmail').textContent = u.email;
  const displayName = (p && p.username) || u.email.split('@')[0];
  document.getElementById('userName').textContent = displayName;
  document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();
  loadData();
}

async function loadData() {
  const { data, error } = await supabase
    .from('Off-take 2026')
    .select('*')
    .limit(2000);

  const wrap = document.getElementById('tableWrap');

  if (error) {
    wrap.innerHTML = `<div class="empty">
      <div class="ei">⚠️</div>
      <p>ไม่สามารถโหลดข้อมูลได้<br>
      <span style="color:#ccc;font-size:12px">${error.message}</span><br>
      <span style="color:#ccc;font-size:12px">Run add_rls_existing_tables.sql in Supabase SQL Editor</span></p>
    </div>`;
    document.getElementById('rowCount').textContent = 'Load failed';
    return;
  }

  if (!data || data.length === 0) {
    wrap.innerHTML = '<div class="empty"><div class="ei">📭</div><p>No data found in Off-take 2026</p></div>';
    document.getElementById('rowCount').textContent = '0 records';
    return;
  }

  allData = data;
  columns = Object.keys(data[0]).filter(c => c !== 'id');
  detectAndShowInfo(data);
  renderTable(data);

  // Realtime
  supabase.channel('offtake')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'Off-take 2026' }, loadData)
    .subscribe();
}

function detectAndShowInfo(data) {
  const numCols = columns.filter(c => typeof data[0][c] === 'number');
  if (!numCols.length) return;
  const bar = document.getElementById('infoBar');
  bar.style.display = 'flex';
  bar.innerHTML = numCols.map(c => {
    const vals = data.map(r => parseFloat(r[c] || 0)).filter(v => !isNaN(v));
    const total = vals.reduce((s, v) => s + v, 0);
    const avg = vals.length ? total / vals.length : 0;
    const label = c.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    return `<div class="info-item">
      <div style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:.4px">${label}</div>
      <div><strong>${Number(total).toLocaleString('th-TH', {maximumFractionDigits: 0})}</strong>
      <span style="color:#aaa;font-size:12px"> รวม | เฉลี่ย ${Number(avg).toLocaleString('th-TH', {maximumFractionDigits: 1})}</span></div>
    </div>`;
  }).join('<div style="width:1px;background:#f0f0f0;align-self:stretch"></div>');
}

function filterRows() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = q ? allData.filter(row => columns.some(c => String(row[c] ?? '').toLowerCase().includes(q))) : allData;
  renderTable(filtered);
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  filterRows();
}

function renderTable(data) {
  document.getElementById('rowCount').textContent = `${data.length.toLocaleString()} records`;
  const wrap = document.getElementById('tableWrap');
  if (!data.length) {
    wrap.innerHTML = '<div class="empty"><div class="ei">🔍</div><p>No results found</p></div>';
    return;
  }

  let sorted = [...data];
  if (sortCol) {
    sorted.sort((a, b) => {
      const av = a[sortCol], bv = b[sortCol];
      if (av === null || av === undefined) return 1;
      if (bv === null || bv === undefined) return -1;
      return sortAsc ? (av > bv ? 1 : -1) : (av < bv ? 1 : -1);
    });
  }

  const fv = (v, col) => {
    if (v === null || v === undefined) return '<span style="color:#ddd">—</span>';
    if (typeof v === 'number') return `<span class="col-num">${Number(v).toLocaleString('th-TH')}</span>`;
    if (typeof v === 'string' && /^\d{4}-\d{2}-\d{2}/.test(v)) {
      return `<span class="col-date">${new Date(v).toLocaleDateString('th-TH')}</span>`;
    }
    const s = String(v);
    return s.length > 60 ? s.slice(0, 57) + '…' : s;
  };

  const label = c => c.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
  const arrow = c => sortCol === c ? (sortAsc ? ' ↑' : ' ↓') : '';

  const numCols = columns.filter(c => typeof sorted[0][c] === 'number');
  const footer = numCols.length ? `<tfoot><tr>${columns.map((c, i) => {
    if (i === 0) return `<td>รวม (Total)</td>`;
    if (!numCols.includes(c)) return `<td></td>`;
    const total = sorted.reduce((s, r) => s + (parseFloat(r[c]) || 0), 0);
    return `<td class="col-num">${Number(total).toLocaleString('th-TH', {maximumFractionDigits: 0})}</td>`;
  }).join('')}</tr></tfoot>` : '';

  wrap.innerHTML = `<table>
    <thead><tr>${columns.map(c => `<th onclick="sortBy('${c}')">${label(c)}${arrow(c)}</th>`).join('')}</tr></thead>
    <tbody>${sorted.map(row => `<tr>${columns.map(c => `<td>${fv(row[c], c)}</td>`).join('')}</tr>`).join('')}</tbody>
    ${footer}
  </table>`;
}

function exportExcel() {
  if (!allData.length) { alert('No data to export'); return; }
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(allData), 'Off-take 2026');
  XLSX.writeFile(wb, `Offtake_2026_${new Date().toISOString().slice(0, 10)}.xlsx`);
}

async function logout() {
  await supabase.auth.signOut();
  window.location.href = 'index.html';
}

checkAuth();
</script>
</body>
